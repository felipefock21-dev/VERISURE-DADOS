# Render.com - Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: verisure-compilador
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT flask_app.app:app

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      # Defina no dashboard do Render (Environment):
      # OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, DEPLOY_URL (ex: https://seu-app.onrender.com), DRIVE_FOLDER_ID
